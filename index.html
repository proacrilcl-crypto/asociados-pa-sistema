<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asociados P&A</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

.sidebar{
width:220px;
background:#1e293b;
color:white;
position:fixed;
height:100%;
padding:20px;
}

.sidebar h2{
margin-top:0;
}

.sidebar button{
display:block;
width:100%;
margin:10px 0;
padding:10px;
background:#334155;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
}

.sidebar button:hover{
background:#2563eb;
}

.content{
margin-left:240px;
padding:30px;
}

.card{
background:white;
padding:20px;
margin:10px 0;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input, select, textarea{
width:100%;
padding:10px;
margin:5px 0 15px 0;
border-radius:6px;
border:1px solid #ccc;
}

button.primary{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

.login{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.hidden{
display:none;
}

</style>

</head>
<body>

<div id="login" class="login">
<div class="login-box">

<h2>Asociados P&A</h2>

<label>Correo</label>
<input type="email" placeholder="admin@asociadospa.cl">

<label>Contraseña</label>
<input type="password" placeholder="********">

<button class="primary" onclick="entrar()">Ingresar</button>

</div>
</div>

<div id="app" class="hidden">

<div class="sidebar">

<h2>Asociados P&A</h2>

<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('pedidos')">Pedidos</button>
<button onclick="mostrar('nuevo')">Nuevo Pedido</button>
<button onclick="mostrar('gastos')">Gastos</button>
<button onclick="mostrar('comisiones')">Comisiones</button>

<button onclick="salir()" style="background:#7f1d1d">Cerrar sesión</button>

</div>

<div class="content">

<div id="dashboard" class="pagina">

<h1>Dashboard</h1>

<div class="card">Ingresos disponibles: $0</div>
<div class="card">Abonos pendientes: $0</div>
<div class="card">Gastos: $0</div>
<div class="card">Ganancia real: $0</div>
<div class="card">Pedidos activos: 0</div>
<div class="card">Pedidos del día: 0</div>

</div>

<div id="pedidos" class="pagina hidden">

<h1>Pedidos</h1>

<div class="card">

<table width="100%">
<tr>
<th>N°</th>
<th>Cliente</th>
<th>Vendedor</th>
<th>Total</th>
<th>Estado</th>
</tr>

<tr>
<td>01</td>
<td>Ejemplo</td>
<td>Genesis</td>
<td>$0</td>
<td>Agendado</td>
</tr>

</table>

</div>

</div>

<div id="nuevo" class="pagina hidden">

<h1>Nuevo Pedido</h1>

<div class="card">

<label>Cliente</label>
<input>

<label>Teléfono</label>
<input>

<label>Tipo entrega</label>
<select>
<option>Retiro</option>
<option>Delivery</option>
</select>

<label>Dirección</label>
<input>

<label>Comuna</label>
<input>

<label>Referencia</label>
<input>

<label>Descripción</label>
<textarea></textarea>

<label>Fecha ingreso</label>
<input type="date">

<label>Fecha entrega</label>
<input type="date">

<label>Valor pedido</label>
<input type="number">

<label>Delivery</label>
<input type="number">

<label>Abono</label>
<input type="number">

<label>Estado</label>
<select>
<option>Agendado</option>
<option>En producción</option>
<option>Entregado</option>
</select>

<button class="primary">Guardar pedido</button>

</div>

</div>

<div id="gastos" class="pagina hidden">

<h1>Gastos</h1>

<div class="card">

<label>Fecha</label>
<input type="date">

<label>Descripción</label>
<input>

<label>Monto</label>
<input type="number">

<button class="primary">Guardar gasto</button>

</div>

</div>

<div id="comisiones" class="pagina hidden">

<h1>Comisiones</h1>

<div class="card">
Total vendido: $0
</div>

<div class="card">
Comisión 10%: $0
</div>

</div>

</div>

</div>

<script>

function entrar(){
document.getElementById("login").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")
}

function salir(){
document.getElementById("login").classList.remove("hidden")
document.getElementById("app").classList.add("hidden")
}

function mostrar(id){

document.querySelectorAll(".pagina").forEach(p=>{
p.classList.add("hidden")
})

document.getElementById(id).classList.remove("hidden")

}

</script>

</body>
</html>
