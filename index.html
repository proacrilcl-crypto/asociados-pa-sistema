<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Asociados P&A</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

</head>

<body>

<h2>Asociados P&A</h2>

<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>

<p id="mensaje"></p>

<script>

const firebaseConfig = {
apiKey: "AIza...",
authDomain: "asociados-pa-sistema.firebaseapp.com",
projectId: "asociados-pa-sistema",
};

firebase.initializeApp(firebaseConfig);

function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

firebase.auth().signInWithEmailAndPassword(email,password)
.then(()=>{
document.getElementById("mensaje").innerHTML="Login correcto";
})
.catch((error)=>{
document.getElementById("mensaje").innerHTML=error.message;
});

}

</script>

</body>
</html>
