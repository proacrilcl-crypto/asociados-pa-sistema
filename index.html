<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asociados P&A - Sistema</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div id="loginView" class="login-wrap">

<div class="login-card">

<h1>Asociados P&A</h1>
<p>Sistema de gestión</p>

<label>Correo</label>
<input id="loginEmail" type="email" placeholder="admin@asociadospa.cl">

<label>Contraseña</label>
<input id="loginPassword" type="password" placeholder="**">

<br><br>

<button onclick="login()">Ingresar</button>

<p id="loginMsg"></p>

</div>

</div>


<div id="appView" class="app" style="display:none;">

<aside class="sidebar">

<h2>Panel</h2>

<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('pedidos')">Pedidos</button>
<button onclick="showSection('nuevoPedido')">Nuevo Pedido</button>
<button onclick="showSection('gastos')">Gastos</button>
<button onclick="showSection('comisiones')">Comisiones</button>

<button onclick="logout()">Cerrar sesión</button>

</aside>


<main style="margin-left:220px;padding:20px;">

<section id="dashboard" class="card">

<h2>Dashboard</h2>

<p><b>Ingresos disponibles</b></p>
<p>$0</p>

<p><b>Abonos pendientes</b></p>
<p>$0</p>

<p><b>Gastos</b></p>
<p>$0</p>

<p><b>Ganancia real</b></p>
<p>$0</p>

<p><b>Pedidos activos</b></p>
<p>0</p>

</section>


<section id="pedidos" class="card" style="display:none">

<h2>Pedidos</h2>

<p>Aquí aparecerán los pedidos registrados.</p>

</section>


<section id="nuevoPedido" class="card" style="display:none">

<h2>Nuevo Pedido</h2>

<input placeholder="Cliente"><br><br>
<input placeholder="Producto"><br><br>
<input placeholder="Precio"><br><br>

<button>Guardar pedido</button>

</section>


<section id="gastos" class="card" style="display:none">

<h2>Gastos</h2>

<p>Registro de gastos.</p>

</section>


<section id="comisiones" class="card" style="display:none">

<h2>Comisiones</h2>

<p>Cálculo de comisiones.</p>

</section>

</main>

</div>



<script>

function login(){

document.getElementById("loginView").style.display="none"
document.getElementById("appView").style.display="block"

}

function logout(){

location.reload()

}

function showSection(section){

let sections=["dashboard","pedidos","nuevoPedido","gastos","comisiones"]

sections.forEach(id=>{
document.getElementById(id).style.display="none"
})

document.getElementById(section).style.display="block"

}

</script>


</body>
</html>
